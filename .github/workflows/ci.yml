name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

# Agents push often; cancel superseded runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (vet, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Read the Go version straight from go.mod so CI never drifts.
          go-version-file: go.mod
      - run: make vet
      - run: make build
      - run: make test

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # shellcheck is preinstalled on GitHub-hosted ubuntu runners.
      - run: make shellcheck
